apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-mongo
  template:
    metadata:
      labels:
        app: notes-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
