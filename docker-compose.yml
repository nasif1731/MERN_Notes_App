services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: notes-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - dbURL=${DB_URL:-mongodb://mongo:27017/notes}
    depends_on:
      - mongo
    networks:
      - notes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notes-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - notes-network
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: notes-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=notes
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - notes-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  mongo_data:
  mongo_config:

networks:
  notes-network:
    driver: bridge
